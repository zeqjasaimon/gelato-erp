<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-2xl font-bold tracking-tight text-white">Stoccaggio Materie Prime</h2>
            <p class="text-slate-400 text-sm">Giacenzen in tempo reale, scorte e avvisi di sotto-scorta.</p>
        </div>
        <button onclick="window.apriModalMateria()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 self-start cursor-pointer">
            <i class="fa-solid fa-plus"></i> Inserisci Ingrediente
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Ingredienti Totali</p>
            <p class="text-3xl font-bold mt-2 text-indigo-400" id="tot-ingredienti">0</p>
        </div>
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Allarme Sotto-Scorta</p>
            <p class="text-3xl font-bold mt-2 text-red-400" id="tot-sottoscorta">0</p>
        </div>
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Valore Inventario</p>
            <p class="text-3xl font-bold mt-2 text-emerald-400" id="valore-magazzino">€ 0.00</p>
        </div>
    </div>

    <div class="bg-slate-800/30 border border-slate-700/50 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/60 border-b border-slate-700/60 text-xs font-semibold tracking-wider text-slate-400 uppercase">
                        <th class="p-4">Ingrediente</th>
                        <th class="p-4">Categoria</th>
                        <th class="p-4 text-right">Giacenza</th>
                        <th class="p-4 text-right">Prezzo/Kg</th>
                        <th class="p-4 text-center">Stato</th>
                        <th class="p-4 text-center">Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-magazzino" class="divide-y divide-slate-800 text-sm">
                    <tr><td colspan="6" class="p-4 text-center text-slate-500 italic">Caricamento magazzino cloud in corso...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-materia" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/40">
            <h3 id="modal-titolo" class="font-bold text-lg text-white">💾 Inserisci Nuovo Ingrediente</h3>
            <button onclick="window.chiudiModalMateria()" class="text-slate-400 hover:text-white transition cursor-pointer">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
        
        <form id="form-aggiungi-mp" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Nome Ingrediente</label>
                <input type="text" id="mp-nome" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="Es. Panna">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Categoria</label>
                <select id="mp-categoria" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white text-sm">
                    <option value="Zuccheri">Zuccheri</option>
                    <option value="Grassi">Grassi</option>
                    <option value="Solidi">Solidi / Magri</option>
                    <option value="Neutri">Neutri / Addensanti</option>
                    <option value="Paste">Paste / Gusti</option>
                    <option value="Liquidi">Liquidi / Base</option>
                    <option value="Generico" selected>Generico</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Giacenza (Kg)</label>
                    <input type="number" step="0.001" id="mp-quantita" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white text-sm font-mono text-right" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Scorta Minima (Kg)</label>
                    <input type="number" step="0.001" id="mp-scorta" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white text-sm font-mono text-right" placeholder="0.00">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Prezzo al Kg</label>
                <div class="relative">
                    <span class="absolute left-3 top-2 text-slate-500 text-sm">€</span>
                    <input type="number" step="0.01" id="mp-prezzo" required class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-8 pr-3 py-2 text-white text-sm font-mono text-right" placeholder="0.00">
                </div>
            </div>
            <div class="flex items-center justify-end gap-2 pt-4 border-t border-slate-800">
                <button type="button" onclick="window.chiudiModalMateria()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer">Annulla</button>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer">💾 Salva nel Cloud</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let idArticoloInModifica = null;

    function getUid() {
        return window.fbAuth && window.fbAuth.currentUser ? window.fbAuth.currentUser.uid : null;
    }

    window.apriModalMateria = function() {
        idArticoloInModifica = null;
        const form = document.getElementById('form-aggiungi-mp');
        if (form) form.reset();
        document.getElementById('modal-titolo').innerText = "💾 Inserisci Nuovo Ingrediente";
        document.getElementById('modal-materia').classList.remove('hidden');
    };

    window.chiudiModalMateria = function() {
        document.getElementById('modal-materia').classList.add('hidden');
        idArticoloInModifica = null;
    };

    async function caricaTabella() {
        const uid = getUid();
        if (!uid) return;

        const tbody = document.getElementById('tabella-magazzino');
        if (!tbody) return;

        try {
            const docSnap = await getDoc(doc(window.fbDb, "magazzini", uid));
            const inventario = docSnap.exists() ? (docSnap.data().articoli || []) : [];
            
            tbody.innerHTML = "";
            let sottoScorta = 0;
            let valoreTotale = 0;

            if (inventario.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-500 italic">Il tuo magazzino Cloud è vuoto.</td></tr>`;
                return;
            }

            inventario.forEach(item => {
                const isSotto = item.qta <= (item.min || 0);
                if (isSotto) sottoScorta++;
                valoreTotale += (item.qta * item.prezzo);

                const bgRow = isSotto ? 'bg-rose-500/5' : '';
                const badge = isSotto ? `<span class="px-2 py-0.5 text-[9px] bg-rose-500/10 text-rose-400 border border-rose-500/20 rounded">SOTTO SCORTA</span>` : `<span class="px-2 py-0.5 text-[9px] bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 rounded">OK</span>`;

                tbody.innerHTML += `
                    <tr class="text-slate-300 border-b border-slate-800/60 text-xs ${bgRow} hover:bg-slate-800/10">
                        <td class="p-4 font-bold text-white text-sm">${item.nome}</td>
                        <td class="p-4 uppercase text-slate-400 tracking-wider text-[10px]">${item.cat || 'Generico'}</td>
                        <td class="p-4 font-mono text-right text-sm ${isSotto ? 'text-rose-400 font-bold' : 'text-sky-400'}">${item.qta.toFixed(2)} kg</td>
                        <td class="p-4 font-mono text-right text-emerald-400">€ ${item.prezzo.toFixed(2)}</td>
                        <td class="p-4 text-center">${badge}</td>
                        <td class="p-4 text-center">
                            <button onclick="window.avviaModifica(${item.id})" class="text-slate-400 hover:text-sky-400 p-1"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="window.eliminaArticolo(${item.id}, '${item.nome}')" class="text-slate-500 hover:text-rose-400 p-1 ml-2"><i class="fa-regular fa-trash-can"></i></button>
                        </td>
                    </tr>
                `;
            });

            if(document.getElementById('tot-ingredienti')) document.getElementById('tot-ingredienti').innerText = inventario.length;
            if(document.getElementById('tot-sottoscorta')) document.getElementById('tot-sottoscorta').innerText = sottoScorta;
            if(document.getElementById('valore-magazzino')) document.getElementById('valore-magazzino').innerText = `€ ${valoreTotale.toFixed(2)}`;

        } catch (e) { console.error(e); }
    }

    window.avviaModifica = async function(id) {
        const uid = getUid();
        const docSnap = await getDoc(doc(window.fbDb, "magazzini", uid));
        const item = docSnap.data().articoli.find(i => i.id === id);
        if (!item) return;

        idArticoloInModifica = id;
        document.getElementById('mp-nome').value = item.nome;
        document.getElementById('mp-categoria').value = item.cat || 'Generico';
        document.getElementById('mp-quantita').value = item.qta;
        document.getElementById('mp-scorta').value = item.min || 0;
        document.getElementById('mp-prezzo').value = item.prezzo;

        document.getElementById('modal-titolo').innerText = "🔄 Modifica Ingrediente";
        document.getElementById('modal-materia').classList.remove('hidden');
    };

    window.eliminaArticolo = async function(id, nome) {
        const uid = getUid();
        if (!confirm(`Eliminare ${nome}?`)) return;
        const docRef = doc(window.fbDb, "magazzini", uid);
        const docSnap = await getDoc(docRef);
        const nuovo = docSnap.data().articoli.filter(i => i.id !== id);
        await setDoc(docRef, { articoli: nuovo });
        caricaTabella();
    };

    // Evento Submit agganciato direttamente
    document.getElementById('form-aggiungi-mp').onsubmit = async function(e) {
        e.preventDefault();
        const uid = getUid();
        if(!uid) return;

        const nome = document.getElementById('mp-nome').value.trim();
        const cat = document.getElementById('mp-categoria').value;
        const qta = parseFloat(document.getElementById('mp-quantita').value) || 0;
        const min = parseFloat(document.getElementById('mp-scorta').value) || 0;
        const prezzo = parseFloat(document.getElementById('mp-prezzo').value) || 0;

        const docRef = doc(window.fbDb, "magazzini", uid);
        const docSnap = await getDoc(docRef);
        let inventario = docSnap.exists() ? (docSnap.data().articoli || []) : [];

        if (idArticoloInModifica !== null) {
            let idx = inventario.findIndex(i => i.id === idArticoloInModifica);
            if(idx !== -1) inventario[idx] = { id: idArticoloInModifica, nome, cat, qta, min, prezzo };
        } else {
            inventario.push({ id: Date.now(), nome, cat, qta, min, prezzo });
        }

        await setDoc(docRef, { articoli: inventario });
        window.chiudiModalMateria();
        caricaTabella();
    };

    // Loop autonomo di controllo caricamento dati
    setInterval(() => {
        if (window.fbAuth && window.fbAuth.currentUser) {
            const el = document.getElementById('tot-ingredienti');
            if (el && el.innerText === "0") {
                caricaTabella();
            }
        }
    }, 800);
</script>

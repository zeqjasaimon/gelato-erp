<div class="space-y-6">
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
        <div>
            <h2 class="text-2xl font-bold tracking-tight text-white">Stoccaggio Materie Prime</h2>
            <p class="text-slate-400 text-sm">Giacenze in tempo reale, scorte e avvisi di sotto-scorta.</p>
        </div>
        <button onclick="window.apriModalMateria()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2 self-start cursor-pointer">
            <i class="fa-solid fa-plus"></i> Inserisci Ingrediente
        </button>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Ingredienti Totali</p>
            <p class="text-3xl font-bold mt-2 text-indigo-400" id="tot-ingredienti">0</p>
        </div>
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Allarme Sotto-Scorta</p>
            <p class="text-3xl font-bold mt-2 text-red-400" id="tot-sottoscorta">0</p>
        </div>
        <div class="bg-slate-800/40 border border-slate-700/60 p-4 rounded-xl">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Valore Inventario</p>
            <p class="text-3xl font-bold mt-2 text-emerald-400" id="valore-magazzino">€ 0.00</p>
        </div>
    </div>

    <div class="bg-slate-800/30 border border-slate-700/50 rounded-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-900/60 border-b border-slate-700/60 text-xs font-semibold tracking-wider text-slate-400 uppercase">
                        <th class="p-4">Ingrediente</th>
                        <th class="p-4">Categoria</th>
                        <th class="p-4 text-right">Giacenza</th>
                        <th class="p-4 text-right">Prezzo/Kg</th>
                        <th class="p-4 text-center">Stato</th>
                        <th class="p-4 text-center">Azioni</th>
                    </tr>
                </thead>
                <tbody id="tabella-magazzino" class="divide-y divide-slate-800 text-sm">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-materia" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl shadow-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-150">
        <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950/40">
            <h3 id="modal-titolo" class="font-bold text-lg text-white">💾 Inserisci Nuovo Ingrediente</h3>
            <button onclick="window.chiudiModalMateria()" class="text-slate-400 hover:text-white transition cursor-pointer">
                <i class="fa-solid fa-xmark text-lg"></i>
            </button>
        </div>
        
        <form id="form-aggiungi-mp" class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Nome Ingrediente</label>
                <input type="text" id="mp-nome" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm" placeholder="Es. Saccarosio">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Categoria</label>
                <select id="mp-categoria" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm">
                    <option value="Zuccheri">Zuccheri</option>
                    <option value="Grassi">Grassi</option>
                    <option value="Solidi">Solidi / Magri</option>
                    <option value="Neutri">Neutri / Addensanti</option>
                    <option value="Paste">Paste / Gusti</option>
                    <option value="Liquidi">Liquidi / Base</option>
                    <option value="Generico" selected>Generico</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Giacenza (Kg)</label>
                    <input type="number" step="0.001" id="mp-quantita" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm font-mono text-right" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Scorta Minima (Kg)</label>
                    <input type="number" step="0.001" id="mp-scorta" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm font-mono text-right" placeholder="0.00">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Prezzo al Kg</label>
                <div class="relative">
                    <span class="absolute left-3 top-2 text-slate-500 text-sm">€</span>
                    <input type="number" step="0.01" id="mp-prezzo" required class="w-full bg-slate-950 border border-slate-800 rounded-lg pl-8 pr-3 py-2 text-white focus:outline-none focus:border-indigo-500 text-sm font-mono text-right" placeholder="0.00">
                </div>
            </div>

            <div class="flex items-center justify-end gap-2 pt-4 border-t border-slate-800">
                <button type="button" onclick="window.chiudiModalMateria()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded-lg text-sm font-medium transition cursor-pointer">Annulla</button>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-lg shadow-indigo-600/20 cursor-pointer">💾 Salva nel Cloud</button>
            </div>
        </form>
    </div>
</div>

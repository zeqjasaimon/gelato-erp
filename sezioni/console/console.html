<div class="space-y-8">
    <div>
        <h2 class="text-2xl font-bold tracking-tight text-amber-400"><i class="fa-solid fa-sliders mr-2"></i>Console Master</h2>
        <p class="text-slate-400 text-sm">Cabina di regia di Saimon per gestire clienti e configurazioni iniziali del software.</p>
    </div>

    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-4">
        <h3 class="text-base font-bold text-white border-b border-slate-800 pb-2"><i class="fa-solid fa-user-clock text-orange-400 mr-2"></i>Richieste di Registrazione da Revisionare</h3>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-950/60 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-800">
                        <th class="p-3">Titolare</th>
                        <th class="p-3">Gelateria</th>
                        <th class="p-3">Indirizzo</th>
                        <th class="p-3">Email</th>
                        <th class="p-3 text-center">Azione</th>
                    </tr>
                </thead>
                <tbody id="tabella-richieste-approvazione" class="divide-y divide-slate-800 text-sm text-slate-300">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-xl space-y-4">
        <div class="flex justify-between items-center border-b border-slate-800 pb-3">
            <h3 class="text-base font-bold text-white"><i class="fa-solid fa-boxes-stacked text-amber-400 mr-2"></i>Ingredienti Standard di Default</h3>
            <button onclick="aggiungiMateriaDefault()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-3 py-1.5 rounded-lg transition cursor-pointer">
                + Aggiungi a Pacchetto Base
            </button>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-950/60 text-slate-400 text-xs font-semibold uppercase tracking-wider border-b border-slate-800">
                        <th class="p-3">Nome Ingrediente</th>
                        <th class="p-3">Categoria</th>
                        <th class="p-3 text-right">Quantità Default</th>
                        <th class="p-3 text-right">Prezzo/Kg (€)</th>
                        <th class="p-3 text-center">Rimuovi</th>
                    </tr>
                </thead>
                <tbody id="tabella-console-default" class="divide-y divide-slate-800 text-sm">
                    </tbody>
            </table>
        </div>
    </div>
</div>
